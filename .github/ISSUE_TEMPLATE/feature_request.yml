name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: version-check
    attributes:
      label: Version check
      options:
        - label: I am using **sluggi 14.x** (older versions are not supported)
          required: true
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
