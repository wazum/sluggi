name: Tests

on:
  push:
    branches:
      - main
      - 'fix/*'
      - 'feature/*'
  pull_request:
  workflow_dispatch:
    inputs:
      typo3_release:
        description: 'TYPO3 release version(s) that triggered this run'
        required: false
        type: string

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-security-blocking

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHP CS Fixer
        run: composer cs:check

  js-unit:
    name: JavaScript Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

  unit:
    name: Unit (PHP ${{ matrix.php }} - TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # TYPO3 12.4 LTS
          - php: '8.2'
            typo3: '12.4'
          - php: '8.3'
            typo3: '12.4'
          # TYPO3 13.4 LTS
          - php: '8.2'
            typo3: '13.4'
          - php: '8.3'
            typo3: '13.4'
          - php: '8.4'
            typo3: '13.4'
          # TYPO3 14.x
          - php: '8.2'
            typo3: '14.2'
          - php: '8.3'
            typo3: '14.2'
          - php: '8.4'
            typo3: '14.2'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          tools: composer

      - name: Install dependencies
        run: |
          composer require "typo3/cms-core:^${{ matrix.typo3 }}" "typo3/cms-backend:^${{ matrix.typo3 }}" "typo3/cms-redirects:^${{ matrix.typo3 }}" --no-update --no-interaction
          composer install --no-interaction --no-security-blocking

      - name: Run unit tests
        run: vendor/bin/phpunit -c Tests/phpunit.xml --testsuite unit

  functional:
    name: Functional (PHP ${{ matrix.php }} - TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # TYPO3 12.4 LTS
          - php: '8.2'
            typo3: '12.4'
          - php: '8.3'
            typo3: '12.4'
          # TYPO3 13.4 LTS
          - php: '8.2'
            typo3: '13.4'
          - php: '8.3'
            typo3: '13.4'
          - php: '8.4'
            typo3: '13.4'
          # TYPO3 14.x
          - php: '8.2'
            typo3: '14.2'
          - php: '8.3'
            typo3: '14.2'
          - php: '8.4'
            typo3: '14.2'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_sqlite
          tools: composer

      - name: Install dependencies
        run: |
          composer require "typo3/cms-core:^${{ matrix.typo3 }}" "typo3/cms-backend:^${{ matrix.typo3 }}" "typo3/cms-redirects:^${{ matrix.typo3 }}" --no-update --no-interaction
          composer install --no-interaction --no-security-blocking

      - name: Run functional tests
        run: typo3DatabaseDriver=pdo_sqlite vendor/bin/phpunit --bootstrap vendor/typo3/testing-framework/Resources/Core/Build/FunctionalTestsBootstrap.php Tests/Functional

  e2e:
    name: E2E (PHP ${{ matrix.php }} - TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # TYPO3 12.4 LTS
          - php: '8.2'
            typo3: '12.4'
            dist: '12.4'
          - php: '8.3'
            typo3: '12.4'
            dist: '12.4'
          # TYPO3 13.4 LTS
          - php: '8.2'
            typo3: '13.4'
            dist: '13.4'
          - php: '8.3'
            typo3: '13.4'
            dist: '13.4'
          - php: '8.4'
            typo3: '13.4'
            dist: '13.4'
          # TYPO3 14.x (dist 14.0 — no newer cms-base-distribution published)
          - php: '8.2'
            typo3: '14.2'
            dist: '14.0'
          - php: '8.3'
            typo3: '14.2'
            dist: '14.0'
          - php: '8.4'
            typo3: '14.2'
            dist: '14.0'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: typo3
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_mysql, gd, zip
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create TYPO3 project
        run: composer create-project typo3/cms-base-distribution:^${{ matrix.dist }} typo3-test --no-interaction

      - name: Install sluggi extension
        run: |
          cd typo3-test
          composer config --unset platform.php
          composer config repositories.sluggi path ../
          composer require "typo3/cms-core:^${{ matrix.typo3 }}" wazum/sluggi:@dev --no-interaction --with-all-dependencies --no-security-blocking

      - name: Setup TYPO3
        run: |
          cd typo3-test
          ./vendor/bin/typo3 setup --driver=mysqli --host=127.0.0.1 --port=3306 \
            --dbname=typo3 --username=root --password=root \
            --admin-username=admin --admin-user-password=Password123! \
            --admin-email=admin@example.com --project-name=test \
            --server-type=other --no-interaction

      - name: Run database migrations (TYPO3 14+ only)
        if: startsWith(matrix.typo3, '14.')
        run: |
          cd typo3-test
          ./vendor/bin/typo3 extension:setup

      - name: Create site configuration
        run: |
          mkdir -p typo3-test/config/sites/main
          printf '%s\n' \
            "rootPageId: 1" \
            "base: 'http://127.0.0.1:8080/'" \
            "languages:" \
            "  - title: English" \
            "    enabled: true" \
            "    languageId: 0" \
            "    base: /" \
            "    locale: en_US.UTF-8" \
            "    navigationTitle: ''" \
            "    flag: us" \
            > typo3-test/config/sites/main/config.yaml

      - name: Import test fixtures
        run: mysql -h 127.0.0.1 -u root -proot typo3 < Tests/E2e/fixtures/database.sql

      - name: Configure extension settings
        run: |
          mkdir -p typo3-test/config/system
          cat > typo3-test/config/system/additional.php << 'EOF'
          <?php
          declare(strict_types=1);
          $GLOBALS['TYPO3_CONF_VARS']['BE']['passwordPolicy'] = '';
          $GLOBALS['TYPO3_CONF_VARS']['SYS']['trustedHostsPattern'] = '.*';
          if ((new \TYPO3\CMS\Core\Information\Typo3Version())->getMajorVersion() >= 14) {
              $GLOBALS['TYPO3_CONF_VARS']['BE']['defaultUserTSconfig'] = ($GLOBALS['TYPO3_CONF_VARS']['BE']['defaultUserTSconfig'] ?? '') . "\nsetup.override.contextualRecordEdit = 0\n";
          }
          $testId = $_SERVER['HTTP_X_PLAYWRIGHT_TEST_ID'] ?? 'default';
          $sluggiSettings = match ($testId) {
              'last-segment-only' => [
                  'exclude_doktypes' => '254',
                  'last_segment_only' => '1',
                  'synchronize' => '1',
                  'lock' => '0',
                  'allow_full_path_editing' => '1',
              ],
              'hierarchy-permission', 'field-access-restriction' => [
                  'exclude_doktypes' => '254',
                  'last_segment_only' => '0',
                  'synchronize' => '1',
                  'lock' => '1',
              ],
              'slug-lock' => [
                  'exclude_doktypes' => '254',
                  'last_segment_only' => '0',
                  'synchronize' => '1',
                  'lock' => '1',
              ],
              'redirect-control' => [
                  'exclude_doktypes' => '254',
                  'last_segment_only' => '0',
                  'synchronize' => '1',
                  'lock' => '1',
                  'redirect_control' => '1',
              ],
              default => [
                  'exclude_doktypes' => '254',
                  'last_segment_only' => '0',
                  'synchronize' => '1',
                  'lock' => '1',
              ],
          };
          $GLOBALS['TYPO3_CONF_VARS']['EXTENSIONS']['sluggi'] = $sluggiSettings;
          EOF

      - name: Start nginx + PHP-FPM
        run: |
          set -euo pipefail
          sudo apt-get install -y nginx

          # Locate PHP-FPM binary (shivammathur installs a versioned name too)
          FPM_BIN="$(command -v "php-fpm${{ matrix.php }}" || command -v php-fpm || true)"
          if [ -z "$FPM_BIN" ]; then
            echo "php-fpm binary not found in PATH" >&2
            ls /usr/sbin/php-fpm* /usr/bin/php-fpm* 2>&1 || true
            exit 1
          fi
          echo "Using PHP-FPM: $FPM_BIN"

          # PHP-FPM on TCP 9000, runs as the GitHub runner user.
          cat > /tmp/php-fpm.conf <<CONF
          [global]
          error_log = /tmp/php-fpm.log
          daemonize = yes
          [www]
          listen = 127.0.0.1:9000
          user = $(id -un)
          group = $(id -gn)
          pm = dynamic
          pm.max_children = 10
          pm.start_servers = 2
          pm.min_spare_servers = 1
          pm.max_spare_servers = 4
          clear_env = no
          CONF
          sudo "$FPM_BIN" --fpm-config /tmp/php-fpm.conf
          sleep 1
          ss -tlnp | grep ':9000' || (cat /tmp/php-fpm.log; exit 1)

          # nginx server block — mirrors DDEV's TYPO3 site config. The map picks
          # the right backend entry point: TYPO3 14+ = /index.php, TYPO3 12/13 = /typo3/index.php.
          sudo tee /etc/nginx/sites-available/default >/dev/null <<NGINX
          map \$typo3_index_exists \$typo3_index {
              default  /index.php;
              1        /typo3/index.php;
          }

          server {
              listen 8080 default_server;
              root ${GITHUB_WORKSPACE}/typo3-test/public;
              index index.php;

              set \$typo3_index_exists 0;
              if (-f \$document_root/typo3/index.php) {
                  set \$typo3_index_exists 1;
              }

              location / {
                  absolute_redirect off;
                  try_files \$uri \$uri/ /index.php\$is_args\$args;
              }

              location = /typo3 {
                  rewrite ^ /typo3/;
              }

              location /typo3/ {
                  absolute_redirect off;
                  try_files \$uri \$typo3_index\$is_args\$args;
              }

              location ~ \.php\$ {
                  try_files \$uri =404;
                  fastcgi_split_path_info ^(.+\.php)(/.+)\$;
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param SCRIPT_NAME \$fastcgi_script_name;
                  include fastcgi_params;
                  fastcgi_read_timeout 300;
              }
          }
          NGINX

          # nginx defaults to www-data; the repo is under /home/runner which
          # is not traversable for other users. Run nginx as the runner too.
          sudo sed -i "s|^user .*|user $(id -un) $(id -gn);|" /etc/nginx/nginx.conf
          sudo nginx -t
          sudo service nginx restart
          sleep 1
          # Follow redirects so /typo3 → login page counts as 2xx, but still fail on 5xx.
          HTTP_CODE=$(curl -sSL -o /tmp/curl-body -w '%{http_code}' http://127.0.0.1:8080/typo3)
          echo "GET /typo3 => $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 500 ] 2>/dev/null || [ -z "$HTTP_CODE" ]; then
            echo "--- nginx error log ---"
            sudo tail -50 /var/log/nginx/error.log || true
            echo "--- php-fpm log ---"
            sudo tail -50 /tmp/php-fpm.log || true
            echo "--- TYPO3 log ---"
            find typo3-test/var/log -name '*.log' -exec tail -30 {} + 2>&1 | tail -60 || true
            echo "--- response body (exception title + message) ---"
            sed -n 's/.*<title>\(.*\)<\/title>.*/TITLE: \1/p; /exception\|Exception\|error/I p' /tmp/curl-body | head -30
            exit 1
          fi

      - name: Install Playwright
        run: |
          cd Tests/E2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd Tests/E2e
          mkdir -p .auth
          npm test
        env:
          TYPO3_BASE_URL: http://127.0.0.1:8080
          TYPO3_ADMIN_USER: admin
          TYPO3_ADMIN_PASS: docker

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-php${{ matrix.php }}-typo3-${{ matrix.typo3 }}
          path: Tests/E2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
