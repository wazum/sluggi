name: Publish to TER

on:
  release:
    # 'released' (vs. 'published') skips prereleases and fires when a
    # prerelease is promoted to a full release — gives a window to fix
    # bad release notes or version numbers before TER publishes.
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. 14.10.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to TER
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_BODY: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            RELEASE_TAG="$INPUT_TAG"
            RELEASE_BODY=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json body --jq .body)
          else
            RELEASE_TAG="$EVENT_TAG"
            RELEASE_BODY="$EVENT_BODY"
          fi

          version="$RELEASE_TAG"
          if ! [[ "$version" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag does not match semver format: $version"
            exit 1
          fi
          echo "TER_VERSION=$version" >> "$GITHUB_ENV"

          body="$RELEASE_BODY"
          if [[ -z "${body//[[:space:]]/}" ]]; then
            echo "TER_COMMENT=Release $version" >> "$GITHUB_ENV"
          else
            # Convert GitHub markdown to plain text for TER display:
            # - Strip leaked shell-escape backslashes before " and ` so they don't survive into TER
            # - Strip ## headings but keep them as section titles with blank line before
            # - Remove bold markers (** and *), underscore emphasis (_foo_, lookaround-guarded
            #   so identifiers like sys_redirect stay intact), inline code backticks, links
            # - Replace list dashes with bullets, drop "Full Changelog" line
            plain=$(echo "$body" \
              | sed 's|\\"|"|g; s|\\`|`|g' \
              | sed '/^## /{s/^## //;s/^/\n/;}' \
              | sed '/^### /{s/^### //;s/^/\n/;}' \
              | sed '/^!\[.*\](.*)/d' \
              | sed 's/\*\*\([^*]*\)\*\*/\1/g' \
              | sed 's/\*\([^*]*\)\*/\1/g' \
              | perl -pe 's/(?<![A-Za-z0-9_])_([^_]+)_(?![A-Za-z0-9_])/$1/g' \
              | sed 's/\[\([^]]*\)\]([^)]*)/\1/g' \
              | sed 's/^- /• /g' \
              | sed 's/`\([^`]*\)`/\1/g' \
              | sed '/^Full Changelog:/d' \
              | cat -s)
            plain=$(printf '%s\n\nFull release notes: https://github.com/${{ github.repository }}/releases/tag/%s' "$plain" "$version")
            delimiter="TER_COMMENT_$(date +%s)_$RANDOM"
            {
              echo "TER_COMMENT<<$delimiter"
              echo "$plain"
              echo "$delimiter"
            } >> "$GITHUB_ENV"
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Tailor
        run: composer global require typo3/tailor --no-interaction

      - name: Publish to TER
        run: php ~/.composer/vendor/bin/tailor ter:publish --comment "$TER_COMMENT" "$TER_VERSION" sluggi
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
